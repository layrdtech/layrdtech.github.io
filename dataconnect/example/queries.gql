mutation CreateProject($title: String!, $description: String!) @auth(level: USER) {
  project_insert(data: { title: $title, description: $description, userId_expr: "auth.uid" })
}

mutation UpdateProject($id: UUID!, $title: String, $description: String) @auth(level: USER) {
  project_update(key: { id: $id }, data: { title: $title, description: $description })
}

mutation DeleteProject($id: UUID!) @auth(level: USER) {
  project_delete(key: { id: $id })
}

query GetProject($id: UUID!) @auth(level: USER) {
  project(id: $id) {
    id
    title
    description
    user { username }
  }
}

query ListMyProjects @auth(level: USER) {
  projects(where: { userId: { eq_expr: "auth.uid" } }) {
    id
    title
    description
  }
}

mutation CreatePost($title: String!, $body: String!, $status: String!) @auth(level: USER) {
  post_insert(data: { title: $title, body: $body, status: $status, userId_expr: "auth.uid" })
}

mutation UpdatePost($id: UUID!, $title: String, $body: String, $status: String) @auth(level: USER) {
  post_update(key: { id: $id }, data: { title: $title, body: $body, status: $status })
}

mutation DeletePost($id: UUID!) @auth(level: USER) {
  post_delete(key: { id: $id })
}

query GetPost($id: UUID!) @auth(level: PUBLIC, insecureReason: "Posts are public content") {
  post(id: $id) {
    id
    title
    body
    user { username }
  }
}

query ListPosts @auth(level: PUBLIC, insecureReason: "Posts are public content") {
  posts {
    id
    title
    status
  }
}

mutation CreateTag($name: String!, $colorCode: String) @auth(level: USER) {
  tag_insert(data: { name: $name, colorCode: $colorCode })
}

mutation UpdateTag($id: UUID!, $name: String, $colorCode: String) @auth(level: USER) {
  tag_update(key: { id: $id }, data: { name: $name, colorCode: $colorCode })
}

mutation DeleteTag($id: UUID!) @auth(level: USER) {
  tag_delete(key: { id: $id })
}

query GetTag($id: UUID!) @auth(level: PUBLIC, insecureReason: "Tags are global identifiers") {
  tag(id: $id) {
    name
    colorCode
  }
}

query ListTags @auth(level: PUBLIC, insecureReason: "Tags are global identifiers") {
  tags {
    name
    colorCode
  }
}

mutation LinkTagToProject($tagId: UUID!, $projectId: UUID!) @auth(level: USER) {
  taggedItem_insert(data: { tagId: $tagId, projectId: $projectId })
}

mutation UnlinkTagFromProject($id: UUID!) @auth(level: USER) {
  taggedItem_delete(key: { id: $id })
}

query ListTaggedItems @auth(level: PUBLIC, insecureReason: "Public project tags") {
  taggedItems {
    id
    tag { name }
    project { title }
  }
}

mutation CreateUser($username: String!, $email: String!, $displayName: String!) @auth(level: USER) {
  user_insert(data: { id_expr: "auth.uid", username: $username, email: $email, displayName: $displayName })
}

mutation UpdateUserProfile($displayName: String, $bio: String) @auth(level: USER) {
  user_update(key: { id_expr: "auth.uid" }, data: { displayName: $displayName, bio: $bio })
}

query GetMyProfile @auth(level: USER) {
  user(key: { id_expr: "auth.uid" }) {
    username
    email
    displayName
    bio
  }
}

query ListUsers @auth(level: PUBLIC, insecureReason: "Public user directory") {
  users {
    username
    displayName
  }
}